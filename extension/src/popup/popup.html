<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Applywise</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        width: 280px;
        font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(160deg, #3a3d42 0%, #25272b 55%, #16171a 100%);
        color: #e7e5e0;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid #4a4d52;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header img {
        width: 28px;
        height: 28px;
      }
      .header span {
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.01em;
      }

      /* On/off toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 22px;
        flex-shrink: 0;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #4a4d52;
        border-radius: 999px;
        transition: background 0.15s ease;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #e7e5e0;
        border-radius: 50%;
        transition: transform 0.15s ease;
      }
      .switch input:checked + .slider {
        background: linear-gradient(90deg, #f5a623, #e8791a);
      }
      .switch input:checked + .slider::before {
        transform: translateX(16px);
        background: #1a1206;
      }
      .switch input:focus-visible + .slider { outline: 2px solid #f5a623; outline-offset: 2px; }

      .body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid #4a4d52;
      }
      .toggle-row span {
        font-size: 13px;
        font-weight: 700;
      }
      .stat {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 500;
      }
      .stat .label {
        color: #9a978f;
      }
      .stat span:last-child { font-weight: 700; }
      .ok {
        color: #f5a623;
      }
      .warn {
        color: #f2c185;
      }
      button {
        width: 100%;
        padding: 11px;
        border-radius: 999px;
        border: none;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -0.01em;
        cursor: pointer;
        background: linear-gradient(90deg, #f5a623, #e8791a);
        color: #1a1206;
        box-shadow: 0 4px 14px rgba(232, 121, 26, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(232, 121, 26, 0.4);
        filter: brightness(1.06);
      }
      button:active { transform: translateY(0) scale(0.98); }
      .hint {
        font-size: 11px;
        color: #9a978f;
        text-align: center;
        line-height: 1.5;
      }
      .version-chip {
        font-size: 10px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
        padding: 2px 7px;
        border-radius: 999px;
        border: 1px solid #4a4d52;
        color: #9a978f;
      }

      /* Hidden until checkForUpdate() finds a newer published build — see
         popup.ts. Uses display:flex when shown, so the JS toggles to "flex". */
      #update-banner {
        display: none;
        width: 100%;
        align-items: center;
        gap: 10px;
        text-align: left;
        padding: 10px 12px;
        border-radius: 10px;
        color: #1a1206;
        background: linear-gradient(90deg, #f5a623, #e8791a);
        box-shadow: 0 4px 14px rgba(232, 121, 26, 0.3);
      }
      .update-dot {
        width: 7px;
        height: 7px;
        flex-shrink: 0;
        border-radius: 50%;
        background: #1a1206;
        animation: pulse-dot 1.6s ease-in-out infinite;
      }
      .update-text {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.35;
      }
      .update-sub {
        display: block;
        font-size: 10px;
        font-weight: 600;
        opacity: 0.75;
      }
      .update-arrow {
        flex-shrink: 0;
        font-size: 13px;
        font-weight: 800;
        transition: transform 0.15s ease;
      }
      #update-banner:hover .update-arrow { transform: translateY(2px); }

      @keyframes pulse-dot {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .update-dot { animation: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="brand">
        <img src="icons/icon-32.png" alt="Applywise logo" />
        <span>Applywise</span>
        <span class="version-chip" id="version-chip" title="Installed version"></span>
      </div>
    </div>
    <div class="body">
      <button id="update-banner" type="button">
        <span class="update-dot"></span>
        <span class="update-text">
          New Update Available
          <span class="update-sub">Tap to get <span id="update-version"></span></span>
        </span>
        <span class="update-arrow">↓</span>
      </button>
      <div class="toggle-row">
        <span id="enabled-label">Applywise is on</span>
        <label class="switch">
          <input type="checkbox" id="enabled-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="stat"><span class="label">Resumes saved</span><span id="resume-count">…</span></div>
      <div class="stat"><span class="label">API key</span><span id="api-key-status">…</span></div>
      <button id="open-setup">Open Setup</button>
      <p class="hint">Click "Analyze with Applywise" on any job posting to get started.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
